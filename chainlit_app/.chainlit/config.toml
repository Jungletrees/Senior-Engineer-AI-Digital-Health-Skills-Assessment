[project]
enable_telemetry = false
user_env = []
session_timeout = 3600
user_session_timeout = 1296000
cache = false
allow_origins = ["*"]

[features]
unsafe_allow_html = false
latex = false
user_message_autoscroll = true
auto_tag_thread = true
edit_message = true

[features.spontaneous_file_upload]
enabled = false
accept = ["application/pdf"]
max_files = 1
max_size_mb = 20

[features.audio]
sample_rate = 24000

[features.mcp.sse]
enabled = false

[features.mcp.stdio]
enabled = false
allowed_executables = ["npx", "uvx"]

[UI]
name = "Ask your documents"
default_theme = "light"
layout = "wide"
default_sidebar_state = "open"
description = "Ask questions about the documents you upload, with sources on every answer."
cot = "hidden"
custom_css = "/public/rag-theme.css"

# The "+ Upload PDF" button in the chat header. This is Chainlit's own documented
# header-link component, so it renders on every viewport (verified at 375/768/1024/1440)
# and touches no internal Chainlit DOM. It opens the dedicated upload page, which is the
# single place documents are added for either chat surface.
[[UI.header_links]]
name = "Upload PDF"
display_name = "Upload PDF"
icon_url = "/public/upload-icon.svg"
url = "http://localhost:3000/documents"

[meta]
generated_by = "2.5.5"
