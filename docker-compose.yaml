services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@relational_db:5432/postgres}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      UPLOAD_STORAGE_BACKEND: ${UPLOAD_STORAGE_BACKEND:-local}
      PAGE_IMAGE_STORAGE_BACKEND: ${PAGE_IMAGE_STORAGE_BACKEND:-local}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_DOCUMENT_BUCKET: ${S3_DOCUMENT_BUCKET:-}
      S3_PAGE_IMAGE_BUCKET: ${S3_PAGE_IMAGE_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      ENABLE_SCHEDULED_JOBS: ${ENABLE_SCHEDULED_JOBS:-true}
    restart: always
    depends_on:
      relational_db:
        condition: service_healthy
    ports:
      - "6100:6100"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:6100/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm start
    restart: always
    environment:
      - BACKEND_URL=http://backend:6100
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"

  chainlit:
    build:
      context: ./chainlit_app
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:6100}
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET:-}
    restart: always
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8000:8000"
  
  relational_db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - db_volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_volume:
