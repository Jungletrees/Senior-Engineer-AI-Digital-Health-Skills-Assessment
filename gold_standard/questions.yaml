# Gold-standard question bank — compact corpus
# ---------------------------------------------
# These questions grade the RAG system against the deterministic, generated corpus described in
# corpus/corpus_manifest.yaml. Together they exercise every retrieval/processing path:
#
#   table / numeric lookup      -> dosing_tables.pdf        (structure-aware chunking, tables)
#   semantic prose paraphrase   -> referral_guidance.pdf    (fixed-size chunking)
#   heading-hierarchy lookup    -> treatment_protocol.pdf   (structure-aware chunking, hierarchy)
#   OCR-only fact               -> scanned_dosing_card.pdf  (OCR fallback; no text layer)
#   cross-document synthesis    -> dosing_tables + treatment_protocol (source_docs list)
#   out-of-corpus refusal       -> no source; must decline
#
# Fields (see grader.py):
#   id, question, category (dosing|threshold|classification|procedure|synthesis|refusal),
#   weight (safety-critical dosing/synthesis weighted highest),
#   source_doc     single manifest id the answer must cite (null for a refusal question)
#   source_docs    LIST of manifest ids for a synthesis question — grounding scores by how many
#                  of the required documents the answer actually cites (full credit only if all)
#   expected_page  1-based page or "P-Q" range; null grades doc-level only
#   expected_answer  canonical human answer (judge + human verification)
#   expected_facts   atomic facts that must appear (fraction/unit-normalized, case-insensitive)
#   verified       true = grounded against the source and scored; false = skipped as unverified
#
# GROUND-TRUTH HONESTY: every fact below is grounded by construction — the corpus is generated by
# build_compact_corpus.py, so the expected facts are exactly what the tables/paragraphs/scanned
# card say. Clinical values follow the WHO IMCI framework and are teaching values for a retrieval
# test, not a dosing authority.

questions:
  # ---------------- Table / numeric lookup (structure-aware chunking) ----------------
  - id: dose_amoxicillin_infant
    question: "For a child weighing 4 to under 10 kg with pneumonia, what amoxicillin dose is given, how often, and for how many days?"
    source_doc: dosing_tables
    expected_page: null
    category: dosing
    weight: 3
    expected_answer: "One 250 mg tablet (or 5 ml of syrup), two times daily for 5 days."
    expected_facts: ["250 mg", "two times daily", "5 days"]
    verified: true

  - id: dose_zinc_diarrhoea
    question: "How much zinc is given for diarrhoea, and for how long?"
    source_doc: dosing_tables
    expected_page: null
    category: dosing
    weight: 3
    expected_answer: "Half a 20 mg tablet daily for a child 2 up to 6 months, or one 20 mg tablet daily for a child 6 months up to 5 years; in both cases once daily for 14 days."
    expected_facts: ["20 mg", "14 days"]
    verified: true

  # ---------------- Semantic prose paraphrase (fixed-size chunking) ----------------
  - id: refer_danger_signs
    question: "Which warning signs mean a sick young child should be sent to hospital straight away?"
    source_doc: referral_guidance
    expected_page: null
    category: classification
    weight: 2
    expected_answer: "A general danger sign: the child is not able to drink or breastfeed, vomits everything, has had a convulsion, or is lethargic or unconscious."
    expected_facts: ["vomits everything", "convulsion", "lethargic"]
    verified: true

  # ---------------- Semantic matching (contextual understanding, low lexical overlap) ----------------
  # The wording shares almost no content words with the source ("throws up" vs "vomits",
  # "sleepy" vs "lethargic", "take to hospital" vs "referred"). A lexical/keyword system would
  # miss it; the embedding retrieval must match on meaning. Verified live: this query retrieves
  # the danger-signs chunk of referral_guidance as its top result.
  - id: semantic_vomiting_drowsy_child
    question: "My baby throws up everything they swallow and is too sleepy to feed. Should I take them to hospital?"
    source_doc: referral_guidance
    expected_page: null
    category: classification
    weight: 2
    expected_answer: "Yes — vomiting everything and being too drowsy/lethargic to feed are general danger signs, so the child should be taken to hospital urgently."
    expected_facts: ["hospital"]
    verified: true

  # ---------------- Heading-hierarchy lookup (structure-aware chunking) ----------------
  - id: protocol_followup
    question: "After a child is treated at home for pneumonia, when should they come back for reassessment?"
    source_doc: treatment_protocol
    expected_page: null
    category: procedure
    weight: 2
    expected_answer: "Reassess after 3 days; refer urgently if the child is breathing faster, is unable to drink, or has developed a danger sign."
    expected_facts: ["3 days", "refer"]
    verified: true

  # ---------------- OCR-only fact (scanned image, no text layer) ----------------
  - id: ocr_ors_dose
    question: "How much oral rehydration solution (ORS) should be given after each loose stool?"
    source_doc: scanned_dosing_card
    expected_page: null
    category: dosing
    weight: 3
    expected_answer: "10 ml/kg of ORS after each loose stool."
    expected_facts: ["10 ml/kg", "loose stool"]
    verified: true

  # ---------------- Cross-document synthesis (requires TWO documents) ----------------
  - id: synthesis_pneumonia_treatment_and_followup
    question: "A child has fast-breathing pneumonia. What oral antibiotic dose and schedule should be used, and when should the child return for follow-up?"
    source_docs: [dosing_tables, treatment_protocol]
    expected_page: null
    category: synthesis
    weight: 3
    expected_answer: "Give oral amoxicillin (one 250 mg tablet for a child 4 to under 10 kg) two times daily for 5 days, and have the child return for reassessment after 3 days. The dose comes from the dosing table; the 3-day follow-up comes from the treatment protocol."
    expected_facts: ["amoxicillin", "two times daily", "5 days", "3 days"]
    verified: true

  # ---------------- Out-of-corpus refusal ----------------
  - id: refusal_adult_metformin
    question: "What is the recommended dose of metformin for an adult with type 2 diabetes?"
    source_doc: null
    expected_page: null
    category: refusal
    weight: 1
    expected_answer: "This is outside the paediatric child-health materials provided. The system should decline or state that the answer is not in the uploaded documents rather than invent a dose."
    expected_facts: []
    verified: true
