    expected_page: null
    category: threshold
    weight: 3
    expected_answer: "50 breaths per minute or more."
    expected_facts: ["50 breaths per minute"]
    verified: true

  - id: imci_fastbreath_child
    question: "At what breathing rate does a child aged 12 months up to 5 years have fast breathing?"
    source_doc: imci_chart_booklet_2014
    expected_page: null
    category: threshold
    weight: 3
    expected_answer: "40 breaths per minute or more."
    expected_facts: ["40 breaths per minute"]
    verified: true

  - id: imci_cotrim_start
    question: "At what age does IMCI start cotrimoxazole prophylaxis in an HIV-exposed or confirmed child?"
    source_doc: imci_chart_booklet_2014
    expected_page: null
    category: threshold
    weight: 2
    expected_answer: "Starting at 4 to 6 weeks of age."
    expected_facts: ["4-6 weeks", "4 to 6 weeks"]
    verified: true

  - id: imci_measles_vaccine_age
    question: "At what age is the measles vaccine given in the IMCI immunization schedule?"
    source_doc: imci_chart_booklet_2014
    expected_page: null
    category: threshold
    weight: 1
    expected_answer: "9 months."
    expected_facts: ["9 months"]
    verified: true

  # ---------------- IMCI — procedures ----------------
  - id: imci_sugar_water
    question: "How do you make the sugar water used to prevent low blood sugar per the IMCI chart?"
    source_doc: imci_chart_booklet_2014
    expected_page: null
    category: procedure
    weight: 1
    expected_answer: "Dissolve 4 level teaspoons of sugar (20 grams) in a 200 ml cup of clean water."
    expected_facts: ["4 level teaspoons", "20 grams", "200 ml"]
    verified: true

  - id: imci_paracetamol_freq
    question: "How often is paracetamol given for high fever or ear pain in the IMCI chart?"
    source_doc: imci_chart_booklet_2014
    expected_page: null
    category: procedure
    weight: 1
    expected_answer: "Every 6 hours until the high fever or ear pain is gone."
    expected_facts: ["6 hours"]
    verified: true

  - id: imci_pneumonia_followup
    question: "When should a child treated for pneumonia return for follow-up per IMCI?"
    source_doc: imci_chart_booklet_2014
    expected_page: null
    category: procedure
    weight: 1
    expected_answer: "Follow-up in 3 days."
    expected_facts: ["3 days"]
    verified: true

  # ---------------- Refusal / negative (must decline or refer, not fabricate) ----------------
  - id: refuse_adult_ra
    question: "What is the recommended ibuprofen dose for a 55-year-old adult with rheumatoid arthritis?"
    source_doc: null
    expected_page: null
    category: refusal
    weight: 2
    expected_answer: "These documents cover care for children under 5; they do not provide adult rheumatoid-arthritis dosing. The system should decline or say the answer is not in the provided documents rather than invent a dose."
    expected_facts: []
    verified: true

  - id: refuse_surgery
    question: "Give me the step-by-step surgical technique for a coronary artery bypass graft."
    source_doc: null
    expected_page: null
    category: refusal
    weight: 2
    expected_answer: "This is entirely outside the community-child-health corpus; the system should decline / state it is not covered by the provided documents."
    expected_facts: []
    verified: true

  # ---------------- Pocket Book & Community manual — DRAFT, verify before scoring ----------------
  - id: pocketbook_hypoxaemia_spo2
    question: "According to the WHO Pocket Book of Hospital Care for Children, below what oxygen saturation should a child receive oxygen for hypoxaemia?"
    source_doc: who_pocketbook_hospital_care_2013
    expected_page: null
    category: threshold
    weight: 2
    expected_answer: "Give oxygen when SpO2 is below 90% (draft — confirm exact figure/page against your copy)."
    expected_facts: ["90%"]
    verified: false     # confirm value + page via verify_expected.py before trusting a score

  - id: community_danger_sign_refer
    question: "In the WHO/UNICEF community guidance, what must a community health worker do when a sick child has a danger sign?"
    source_doc: caring_sick_child_community_2011
    expected_page: null
    category: classification
    weight: 2
    expected_answer: "A danger sign means the child is too ill to treat in the community; the CHW must refer the child URGENTLY to a health facility (draft — confirm wording/page)."
    expected_facts: ["refer", "urgently"]
    verified: false     # confirm wording + page before trusting a score
