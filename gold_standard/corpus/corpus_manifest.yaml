# Gold-evaluation corpus — compact, deterministic, generated.
# ------------------------------------------------------------
# This is the DEFAULT gold corpus. It is built (not downloaded) by build_compact_corpus.py and
# is intentionally tiny so the whole gold eval — ingest + retrieve + generate + grade — runs
# end-to-end within a free-tier hosted embedding quota and in a couple of minutes.
#
# Each document is chosen to force a DIFFERENT branch of the ingestion pipeline, so the eval
# proves the system processes each PDF type correctly, not just one:
#
#   dosing_tables       ruled tables, native text   -> structure-aware chunking (table) + page image
#   referral_guidance   flowing prose, no structure -> fixed-size chunking with overlap
#   treatment_protocol  numbered heading hierarchy  -> structure-aware chunking (hierarchy)
#   scanned_dosing_card image only, no text layer   -> OCR fallback extraction
#
# All four are well within the app limits (65 MB / 700 pages). Content is authored in the
# generator, so every gold answer is grounded by construction. The authentic ~659-page WHO
# corpus is preserved in corpus_manifest.who.yaml (+ questions.who.yaml) for anyone who wants to
# run against the originals; be aware it needs a paid or fresh-project embedding key to finish.
#
# Build:  pip install reportlab pillow  &&  python -m gold_standard.corpus.build_compact_corpus
# (equivalently: python -m gold_standard.fetch_corpus, which builds generated docs and verifies
#  their pinned SHA-256.)

corpus_version: 2.0.0-compact
