name: CI

# Proves the repository builds and passes from a COLD CLONE on a machine that is not the
# author's. A warm local Docker cache hides exactly the failures a reviewer hits first:
# a wheel that does not exist for their architecture, a missing system package, a model
# downloaded at runtime, or a schema that was only ever migrated by hand.
#
# Every job therefore starts from a clean checkout, and the image jobs build with
# --no-cache so no layer is inherited from anywhere.

on:
  push:
    branches: [master, "codex/**"]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_PROJECT_NAME: assessment

jobs:
  # ---------------------------------------------------------------- static checks
  frontend:
    name: Frontend (tests, typecheck, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # `npm ci` fails if package-lock.json and package.json disagree, which is the
      # check that the lockfile is actually reproducible.
      - name: Install (locked)
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint
        continue-on-error: true

      - name: Deterministic tests
        run: npm test

      - name: Production build
        run: npm run build

  chainlit:
    name: Chainlit client tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # These tests stub chainlit and httpx, so they must pass with no dependencies
      # installed at all. If this job ever needs a pip install, the stubbing has leaked.
      - name: Chainlit tests
        run: python -m unittest chainlit_app.tests.test_chat -v

  # ------------------------------------------------------------------ backend suite
  backend:
    name: Backend (cold image build + full pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        # The backend image is ~2.7GB (torch + sentence-transformers) and the default
        # runner fills up during the build.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - name: Build backend image with no cache
        run: |
          docker compose build --no-cache backend
          docker images --format '{{.Repository}}\t{{.Size}}' | grep assessment

      - name: Start database and backend
        run: |
          cp .env.example .env
          docker compose up -d relational_db backend

      - name: Wait for health
        # The entrypoint runs `alembic upgrade head` before serving, so a healthy
        # container also proves migrations applied cleanly against an empty volume.
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:6100/health | grep -q '"database":"ok"'; then
              echo "backend healthy"; exit 0
            fi
            sleep 5
          done
          echo "backend never became healthy"
          docker compose logs backend
          exit 1

      - name: Reranker weights are baked in, not downloaded at runtime
        # Guards the regression where the first chat request fetched ~90MB from Hugging
        # Face, making the first question slow and impossible offline.
        run: |
          docker compose exec -T backend python -c "
          import os
          assert os.environ.get('HF_HUB_OFFLINE') == '1', 'HF_HUB_OFFLINE not set'
          from app.retrieval.rerank import get_local_reranker
          get_local_reranker()
          print('reranker loaded offline from the image')
          "

      - name: Full backend suite
        run: docker compose exec -T backend pytest -q

      - name: RAG system integration suite
        run: docker compose exec -T backend pytest app/tests/test_rag_system_integration.py -vv

      - name: Migrations are reversible
        run: |
          docker compose exec -T backend alembic downgrade base
          docker compose exec -T backend alembic upgrade head

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

  # ------------------------------------------------------------------ full stack e2e
  e2e:
    name: E2E (cold full-stack build + Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build the whole stack from scratch
        # This is the step that answers "will it come up on the reviewer's machine".
        run: |
          cp .env.example .env
          docker compose build --no-cache
          docker compose up -d

      - name: Wait for every service
        run: |
          wait_for () {
            for i in $(seq 1 60); do
              if curl -fsS -o /dev/null "$1"; then echo "$1 up"; return 0; fi
              sleep 5
            done
            echo "$1 never came up"; docker compose logs; return 1
          }
          wait_for http://localhost:6100/health
          wait_for http://localhost:3000/
          wait_for http://localhost:8000/

      - name: Install Playwright browsers
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Chat UI e2e on both surfaces, all viewports
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_BASE_URL: http://localhost:6100/api/v1
          PLAYWRIGHT_CHAINLIT_BASE_URL: http://localhost:8000
        run: npx playwright test e2e/chat-ui.spec.ts --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

  # ------------------------------------------------------------------------- gate
  verified:
    name: All checks passed
    runs-on: ubuntu-latest
    # An explicit gate, so nothing downstream (a future deploy job) can run while any
    # check is red or skipped. DEPLOYMENT.md's pipeline hangs off this.
    needs: [frontend, chainlit, backend, e2e]
    steps:
      - run: echo "frontend, chainlit, backend, and e2e all passed"
